# Laptop monitor configuration
# Run `swaymsg -t get_outputs` to discover output names

set $output_primary eDP-1
set $output_secondary DP-1
set $output_tertiary DP-2

# lid switch: disable laptop screen if docked, suspend if undocked
bindswitch --reload --locked lid:on exec ~/.local/bin/lid-switch.sh
bindswitch --reload --locked lid:off output eDP-1 enable
